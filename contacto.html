<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/estilo.css">
  <title>Contacto</title>
</head>
<body class="contacto-body">

<nav>
  <a href="index.html">Inicio</a>
  <a href="nosotros.html">Nosotros</a>
  <a href="contacto.html">Contacto</a>
</nav>

<h1>Contacto</h1>

<div id="mensajeEstado"></div>

<form id="contactForm">
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="email" id="email" placeholder="Correo">
  <textarea id="mensaje" placeholder="Mensaje"></textarea>
  <button type="submit">Enviar</button>
</form>

<script>
const form = document.getElementById('contactForm');
const estado = document.getElementById('mensajeEstado');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  let nombre = document.getElementById('nombre').value.trim();
  let email = document.getElementById('email').value.trim();
  let mensaje = document.getElementById('mensaje').value.trim();

  if (!nombre || !email || !mensaje) {
    estado.innerHTML = '⚠️ Completa todos los campos';
    return;
  }

  if (!email.includes('@')) {
    estado.innerHTML = '❌ Email inválido';
    return;
  }

  estado.innerHTML = '✅ Enviando...';

  window.location.href = `mailto:contacto@cencotech.cl?body=${mensaje}`;
});
</script>

</body>
</html>
